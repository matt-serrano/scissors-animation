<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGOCUTZ | Barber Booking Animations Showcase</title>
    <!-- FontAwesome for arrow icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Fullscreen Particle Canvas -->
    <canvas id="particle-canvas"></canvas>

    <!-- Deep Ambient Glow Layers -->
    <div class="ambient-glow glow-top-left"></div>
    <div class="ambient-glow glow-bottom-right"></div>

    <!-- Minimal Floating Showcase Navigation Arrows -->
    <button id="prev-arrow" class="floating-arrow prev" title="Previous Animation (Left Arrow Key)">
        <i class="fa-solid fa-chevron-left"></i>
    </button>
    
    <button id="next-arrow" class="floating-arrow next" title="Next Animation (Right Arrow Key)">
        <i class="fa-solid fa-chevron-right"></i>
    </button>

    <!-- Script references -->
    <script src="particles.js"></script>
    <script src="app.js"></script>
</body>
</html>
